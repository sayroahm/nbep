<!doctype html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="nbeplogo.png">
    <title>
      NBEP.us | NATIONAL BUREAU OF EXPLOITATION PROTECTION
    </title>
    <style>
      body{
        margin:0px;
        background-color:#dbd9d3;
        font-family: Arial;
      }

      .banner{
        width:100%;
        display:flex;
        align-items:center;
        font-family:Arial, sans-serif;
        background-color:white;
      }

      .banner img{
        margin-left:8px;
        margin-right:4px;
        height:1.36em;
        width:auto;
      }

      .banner .img2{
        margin-left:4px;
        margin-right:4px;
        height:1em;
        width:25px;
      }

      .banner p{
        margin:4px;
        font-weight:500;
      }

      .banner .p2{
        margin-left:7px;
        font-weight:700;
        text-decoration:underline;
        color:#000000;
      }
      
      /* NBEP Top Toolbar */

      .toolbar{
        background-color:#000000;
        padding:8px;
      }

      .dropdown-logo{
        position:relative;
        display:inline-block;
      }

      .dropdown-logo img{
        height:45px;
        width:auto;
        border:2px solid white;
        border-radius:6px;
        cursor:pointer;
      }

      .dropdown-menu{
        display:none;
        position:absolute;
        top:100%;
        left:0;
        background-color:white;
        min-width:180px;
        border:2px solid black;
      }

      .dropdown-menu a{
        display:block;
        padding:10px;
        text-decoration:none;
        color:black;
        font-weight:600;
      }

      .dropdown-menu a:hover{
        background-color:#eeeeee;
      }

      .dropdown-logo:hover .dropdown-menu{
        display:block;
      }
      
      /* NBEP Home Banner */
      .home-banner {
        background-color: #3C47AF;
        width: 100%;
        min-height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      .home-banner-content {
        display: flex;
        flex-direction: column; 
        align-items: center; 
      }

      .home-banner-text h2,
      .home-banner-text h4 {
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
      }

      .home-banner-text h2 {
        font-size: 2rem;
        font-weight: 700;
      }

      .home-banner-text h4 {
        font-size: 1.2rem;
        font-weight: 400;
        margin-top: 10px;
      }

      .home-banner-button {
        margin-top: 55px;
        font-size: 1.2rem;
        color: #3C47AF;
        background-color: #a6e1ff;
        border: 2px solid white;
        border-radius: 6px;
        padding: 10px 20px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.2s;
      }

      .home-banner-button:hover {
        background-color: #7ecfff;
        transform: translateY(-2px);
      }
      
    </style>
  </head>
  <body>
    <div class="banner">
      <img src="nbeplogo.png" alt="logo">
      <img class="img2" src="usflag.png" alt="usflag">
      <p>This is an official site of the NBEP. A non-profit non-government organization.</p>
      <a class="p2" href="https://sayroahm.github.io/nbep/howyouknow">?</a>
    </div>
    <div class="toolbar">
      <div class="dropdown-logo">
        <img src="nbeplogo.png" alt="menu">

        <div class="dropdown-menu">
          <a href="#">Home</a>
          <a href="#">Report Crime</a>
          <a href="#">Resources</a>
          <a href="#">Contact</a>
        </div>
    
      </div>
    </div>
    <div class="home-banner">
      <div class="home-banner-content">
        <div class="home-banner-text">
          <h2>National Bureau of Exploitation Protection</h2>
          <h4>Non-profit Organization for Cyber Crime Reporting.</h4>
        </div>
        <button id="homeBannerBtn" class="home-banner-button">What We Do</button>
      </div>
    </div>

    <script>
      console.log("Version: Lakewood I.124")
    </script>
  </body>
</html>
